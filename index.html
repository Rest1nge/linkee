<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, shrink-to-fit=yes">
  <title>My Links</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 680px;
      width: 100%;
      padding: 30px 20px 40px;
    }

    /* Профиль */
    .profile {
      text-align: center;
      margin-bottom: 36px;
    }

    .avatar {
      width: 60%;
      height: 60%;
      border-radius: 5%;
      object-fit: cover;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0 auto 16px;
      display: block;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .name {
      font-size: 1.5rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 8px;
      letter-spacing: -0.2px;
    }

    .bio {
      font-size: 0.90rem;
      color: rgba(255,255,255,0.7);
      line-height: 1.5;
      max-width: 400px;
      margin: 0 auto;
    }

    /* Ссылки в стиле Linktree */
    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 0 8px;
    }

    .link-item {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px 24px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      color: #ffffff;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      transition: all 0.25s ease;
      text-align: center;
      letter-spacing: 0.2px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }

    .link-item:hover {
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255, 255, 255, 0.35);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    .link-item:active {
      transform: scale(0.98);
    }

    /* Брендинг снизу */
    .branding {
      text-align: center;
      margin-top: 36px;
    }

    .branding span {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.4);
      font-weight: 500;
    }

    /* Кнопка админа - заметная но сдержанная */
    .admin-btn {
        display: block;
        margin: 28px auto 0;
        background: rgb(255 255 255 / 4%);
        border: 1px solid rgb(255 255 255 / 0%);
        color: rgb(255 255 255 / 21%);
        padding: 10px 28px;
        border-radius: 40px;
        font-size: 0.85rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.25s;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
    }

    .admin-btn:hover {
      background: rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.9);
      border-color: rgba(255,255,255,0.3);
    }

    /* ==================== */
    /* АДМИН-ПАНЕЛЬ */
    /* ==================== */
    .admin-overlay {
      position: fixed;
      inset: 0;
      background: #0d1117;
      z-index: 100;
      overflow-y: auto;
      padding: 20px;
      display: none;
      color: #c9d1d9;
    }

    .admin-overlay.active {
      display: block;
    }

    .admin-inner {
      max-width: 500px;
      margin: 0 auto;
      padding: 20px 0 40px;
    }

    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .back-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: #c9d1d9;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.12);
    }

    .admin-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
    }

    .section {
      margin-bottom: 22px;
    }

    .section label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: #8b949e;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .section input,
    .section textarea {
      width: 100%;
      padding: 12px 15px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      color: #c9d1d9;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border 0.2s;
    }

    .section input:focus,
    .section textarea:focus {
      border-color: #58a6ff;
      background: #1a1f2b;
    }

    .section textarea {
      resize: vertical;
      min-height: 65px;
    }

    .file-upload {
      display: block;
      padding: 13px 15px;
      background: #161b22;
      border: 1px dashed #30363d;
      border-radius: 10px;
      text-align: center;
      font-size: 0.9rem;
      color: #8b949e;
      cursor: pointer;
      transition: 0.2s;
    }

    .file-upload:hover {
      border-color: #58a6ff;
      color: #c9d1d9;
    }

    #avatarInput {
      display: none;
    }

    /* Редактор ссылок */
    .link-edit-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .link-edit-row input {
      flex: 1;
      min-width: 130px;
      background: #161b22;
      border: 1px solid #30363d;
      padding: 11px 13px;
      border-radius: 9px;
      color: #c9d1d9;
      font-size: 0.9rem;
    }

    .link-edit-row input:first-child {
      flex: 1.2;
    }

    .remove-link-btn {
      background: rgba(248,81,73,0.12);
      border: 1px solid rgba(248,81,73,0.3);
      color: #f85149;
      border-radius: 9px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: 0.2s;
      white-space: nowrap;
    }

    .remove-link-btn:hover {
      background: rgba(248,81,73,0.25);
      border-color: #f85149;
    }

    .add-link-btn {
      background: rgba(255,255,255,0.06);
      border: 1px dashed #30363d;
      padding: 12px;
      border-radius: 10px;
      width: 100%;
      font-weight: 500;
      color: #8b949e;
      cursor: pointer;
      font-size: 0.9rem;
      transition: 0.2s;
      margin-top: 4px;
    }

    .add-link-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: #58a6ff;
      color: #c9d1d9;
    }

    .save-btn {
      background: #238636;
      color: #ffffff;
      border: 1px solid rgba(240,246,252,0.1);
      padding: 14px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
      transition: 0.2s;
      margin-top: 12px;
    }

    .save-btn:hover {
      background: #2ea043;
    }

    .logout-btn {
      background: transparent;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 11px;
      border-radius: 12px;
      font-size: 0.9rem;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
      transition: 0.2s;
    }

    .logout-btn:hover {
      border-color: #f85149;
      color: #f85149;
    }

    .status-msg {
      font-size: 0.85rem;
      color: #3fb950;
      margin-top: 10px;
      text-align: center;
    }

    hr {
      border: none;
      border-top: 1px solid #21262d;
      margin: 22px 0;
    }
  </style>
</head>
<body>

  <!-- Публичная страница -->
  <div class="container" id="publicView">
    <div class="profile">
      <img id="avatarImg" class="avatar" src="" alt="avatar">
      <div class="name" id="displayName"></div>
      <div class="bio" id="displayBio"></div>
    </div>
    <div class="links" id="linksContainer"></div>

    <!-- Кнопка админа -->
    <button class="admin-btn" id="adminTrigger">Управление</button>

    <div class="branding">
      <span>Rest Linkee</span>
    </div>
  </div>

  <!-- Админ-панель -->
  <div class="admin-overlay" id="adminPanel">
    <div class="admin-inner">
      <div class="admin-header">
        <button class="back-btn" id="backToPublicBtn">← Назад</button>
        <span class="admin-title">Редактирование</span>
        <span style="width:70px;"></span>
      </div>

      <div class="section">
        <label>Имя</label>
        <input type="text" id="editName" placeholder="Ваше имя">
      </div>
      <div class="section">
        <label>Описание</label>
        <textarea id="editBio" placeholder="Краткое описание профиля"></textarea>
      </div>
      <div class="section">
        <label>Фото профиля</label>
        <input type="file" id="avatarInput" accept="image/*">
        <label for="avatarInput" class="file-upload">Выбрать изображение</label>
      </div>

      <div class="section">
        <label>Ссылки</label>
        <div id="linksEditor"></div>
        <button class="add-link-btn" id="addLinkBtn">+ Добавить ссылку</button>
      </div>

      <button class="save-btn" id="saveChangesBtn">Сохранить изменения</button>
      <button class="logout-btn" id="logoutAdminBtn">Выйти из панели</button>
      <div class="status-msg" id="statusMsg"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function() {
      // ========== КОНФИГУРАЦИЯ SUPABASE ==========
      const SUPABASE_URL = 'https://qjgukzqxmdqjagkkywmq.supabase.co/';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqZ3VrenF4bWRxamFna2t5d21xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1OTAzNzAsImV4cCI6MjA5ODE2NjM3MH0.LpstJITV8Gtu_DxctFdrPeGtobhf890ous6qDyATmxo';

      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      const PROFILE_ID = 1;

      const defaultData = {
        name: 'Ваше имя',
        bio: 'Краткое описание профиля',
        avatar: '',
        links: [
          { title: 'Мой сайт', url: 'https://example.com' },
          { title: 'Telegram', url: 'https://t.me' },
        ]
      };

      // DOM
      const publicView = document.getElementById('publicView');
      const adminPanel = document.getElementById('adminPanel');
      const avatarImg = document.getElementById('avatarImg');
      const displayName = document.getElementById('displayName');
      const displayBio = document.getElementById('displayBio');
      const linksContainer = document.getElementById('linksContainer');
      const editName = document.getElementById('editName');
      const editBio = document.getElementById('editBio');
      const avatarInput = document.getElementById('avatarInput');
      const linksEditor = document.getElementById('linksEditor');
      const statusMsg = document.getElementById('statusMsg');

      let appData = JSON.parse(JSON.stringify(defaultData));

      // ========== ЗАГРУЗКА ДАННЫХ ==========
      async function loadFromDB() {
        try {
          const { data, error } = await supabase
            .from('profiles')
            .select('*')
            .eq('id', PROFILE_ID);

          if (error) throw error;

          // ИСПРАВЛЕНИЕ: проверяем, есть ли данные
          if (data && data.length > 0) {
            const row = data[0];
            appData.name = row.name || defaultData.name;
            appData.bio = row.bio || defaultData.bio;
            appData.avatar = row.avatar || '';
            appData.links = row.links || defaultData.links;
            // Кешируем
            localStorage.setItem('linkpage_cache', JSON.stringify(appData));
          } else {
            // Если записи нет — создаем с дефолтными данными
            console.log('Запись не найдена, создаём новую...');
            await saveToDB();
          }
        } catch (err) {
          console.warn('Ошибка загрузки из Supabase:', err);
          const cached = localStorage.getItem('linkpage_cache');
          if (cached) {
            try { appData = JSON.parse(cached); } catch(e) {}
          }
        }
        renderPublic();
      }

      // ========== СОХРАНЕНИЕ ==========
      async function saveToDB() {
        const payload = {
          id: PROFILE_ID,
          name: appData.name,
          bio: appData.bio,
          avatar: appData.avatar,
          links: appData.links,
          updated_at: new Date().toISOString()
        };

        localStorage.setItem('linkpage_cache', JSON.stringify(appData));

        try {
          const { error } = await supabase
            .from('profiles')
            .upsert(payload, { onConflict: 'id' });

          if (error) throw error;
          return true;
        } catch (err) {
          console.error('Ошибка сохранения:', err);
          return false;
        }
      }

      // ========== РЕНДЕР ==========
      function renderPublic() {
        avatarImg.src = appData.avatar || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2296%22 height=%2296%22%3E%3Ccircle cx=%2248%22 cy=%2248%22 r=%2248%22 fill=%22%23667eea%22/%3E%3Ctext x=%2248%22 y=%2266%22 font-size=%2248%22 text-anchor=%22middle%22 fill=%22white%22 font-family=%22sans-serif%22%3E?%3C/text%3E%3C/svg%3E';
        displayName.textContent = appData.name;
        displayBio.textContent = appData.bio;

        linksContainer.innerHTML = '';
        if (appData.links && appData.links.length > 0) {
          appData.links.forEach(link => {
            const a = document.createElement('a');
            a.className = 'link-item';
            a.href = link.url || '#';
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.textContent = link.title || 'Ссылка';
            linksContainer.appendChild(a);
          });
        }
      }

      function populateAdminForm() {
        editName.value = appData.name;
        editBio.value = appData.bio;
        renderLinksEditor();
      }

      function renderLinksEditor() {
        linksEditor.innerHTML = '';
        appData.links.forEach((link, index) => {
          const row = document.createElement('div');
          row.className = 'link-edit-row';
          row.innerHTML = `
            <input type="text" placeholder="Название" value="${escapeHtml(link.title || '')}" data-index="${index}" data-field="title">
            <input type="text" placeholder="URL" value="${escapeHtml(link.url || '')}" data-index="${index}" data-field="url">
            <button class="remove-link-btn" data-index="${index}">Удалить</button>
          `;
          linksEditor.appendChild(row);
        });

        linksEditor.querySelectorAll('input').forEach(input => {
          input.addEventListener('input', function() {
            const idx = parseInt(this.dataset.index);
            const field = this.dataset.field;
            if (!isNaN(idx) && appData.links[idx]) {
              appData.links[idx][field] = this.value;
            }
          });
        });

        linksEditor.querySelectorAll('.remove-link-btn').forEach(btn => {
          btn.addEventListener('click', function() {
            const idx = parseInt(this.dataset.index);
            appData.links.splice(idx, 1);
            renderLinksEditor();
          });
        });
      }

      function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      // Аватар
      avatarInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
          appData.avatar = ev.target.result;
          avatarImg.src = appData.avatar;
        };
        reader.readAsDataURL(file);
      });

      // Переключение
      function showPublic() {
        adminPanel.classList.remove('active');
        publicView.style.display = '';
        renderPublic();
        statusMsg.textContent = '';
      }

      async function showAdmin() {
        const password = prompt('Пароль администратора:');
        if (password === 'Dav') {
          adminPanel.classList.add('active');
          publicView.style.display = 'none';
          populateAdminForm();
        } else if (password !== null) {
          alert('Неверный пароль');
        }
      }

      // Кнопки
      document.getElementById('adminTrigger').addEventListener('click', showAdmin);
      document.getElementById('backToPublicBtn').addEventListener('click', showPublic);
      document.getElementById('logoutAdminBtn').addEventListener('click', showPublic);

      document.getElementById('addLinkBtn').addEventListener('click', () => {
        appData.links.push({ title: '', url: '' });
        renderLinksEditor();
      });

      document.getElementById('saveChangesBtn').addEventListener('click', async () => {
        appData.name = editName.value.trim() || 'Имя';
        appData.bio = editBio.value.trim() || '';
        const success = await saveToDB();
        statusMsg.textContent = success ? 'Изменения сохранены' : 'Сохранено локально (ошибка сервера)';
        setTimeout(() => statusMsg.textContent = '', 3000);
        renderPublic();
      });

      // Старт
      loadFromDB();
    })();
  </script>
</body>
</html>
