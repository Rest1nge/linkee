<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f0f0f">
    <title>Мои ссылки</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --text: #ffffff;
            --sub: #aaaaaa;
            --btn: #2a2a2a;
            --btn-hover: #3a3a3a;
            --accent: #7289da;
            --border: #2a2a2a;
            --input: #111;
            --danger: #ff4757;
            --success: #2ed573;
            --radius: 12px;
            --radius-sm: 8px;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        
        .container {
            width: 100%;
            max-width: 480px;
            text-align: center;
        }
        
        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--border);
            background: var(--card);
            margin-bottom: 16px;
        }
        
        .name {
            font-size: clamp(20px, 5vw, 24px);
            font-weight: 700;
            margin-bottom: 6px;
            word-break: break-word;
        }
        
        .bio {
            color: var(--sub);
            font-size: 14px;
            margin-bottom: 28px;
            white-space: pre-line;
            padding: 0 8px;
        }
        
        .links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .link-btn {
            display: block;
            width: 100%;
            padding: 15px 20px;
            background: var(--btn);
            color: var(--text);
            text-decoration: none;
            border-radius: var(--radius);
            font-size: 15px;
            font-weight: 500;
            border: 1px solid var(--border);
            word-break: break-word;
            transition: all 0.2s;
        }
        
        .link-btn:active { transform: scale(0.98); background: var(--btn-hover); border-color: var(--accent); }
        
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .social-icon {
            color: var(--sub);
            font-size: 22px;
            text-decoration: none;
            padding: 8px;
            min-width: 44px;
            min-height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .social-icon:active { color: var(--accent); transform: scale(1.2); }
        
        .admin-entry {
            margin-top: 28px;
            font-size: 13px;
            color: var(--sub);
            background: none;
            border: 1px solid transparent;
            cursor: pointer;
            opacity: 0.3;
            padding: 8px 16px;
            border-radius: 20px;
            min-height: 44px;
            transition: all 0.3s;
        }
        
        .admin-entry:hover { opacity: 1; color: var(--accent); border-color: var(--accent); }
        
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(4px);
        }
        
        .modal-overlay.active { display: flex; }
        
        .modal {
            background: var(--card);
            border-radius: 16px;
            padding: 28px 24px;
            width: 100%;
            max-width: 360px;
            border: 1px solid var(--border);
            animation: modalIn 0.25s ease;
        }
        
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        .modal h3 { margin-bottom: 6px; font-size: 18px; }
        .modal p { font-size: 13px; color: var(--sub); margin-bottom: 16px; }
        
        .modal input {
            width: 100%;
            padding: 12px 16px;
            background: var(--input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 16px;
            margin-bottom: 12px;
            font-family: inherit;
            outline: none;
        }
        
        .modal input:focus { border-color: var(--accent); }
        
        .modal-buttons { display: flex; gap: 8px; }
        
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-family: inherit;
            min-height: 44px;
        }
        
        .btn-submit { background: var(--accent); color: #fff; }
        .btn-cancel { background: var(--btn); color: var(--text); }
        .error-msg { color: var(--danger); font-size: 12px; display: none; margin-bottom: 8px; }
        .error-msg.show { display: block; animation: shake 0.3s ease; }
        
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
        
        .admin-panel {
            display: none;
            text-align: left;
            background: var(--card);
            border-radius: 16px;
            padding: 20px 18px;
            border: 1px solid var(--border);
        }
        
        .admin-panel.active { display: block; animation: modalIn 0.3s ease; }
        
        .admin-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .back-btn {
            background: var(--btn);
            border: 1px solid var(--border);
            color: var(--text);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .admin-header h3 { font-size: 17px; color: var(--accent); flex: 1; }
        
        .form-group { margin-bottom: 14px; }
        
        .form-group label {
            display: block;
            font-size: 11px;
            color: var(--sub);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 11px 14px;
            background: var(--input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            outline: none;
        }
        
        .form-group textarea { min-height: 45px; max-height: 120px; resize: vertical; }
        
        .link-row, .social-row {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
            align-items: center;
        }
        
        .link-row input, .social-row input {
            flex: 1;
            min-width: 100px;
            padding: 10px 12px;
            background: var(--input);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 13px;
            outline: none;
        }
        
        .social-row select {
            width: 90px;
            padding: 10px 8px;
            background: var(--input);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 12px;
            outline: none;
        }
        
        .del-btn {
            background: #3a1010;
            color: var(--danger);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 18px;
            flex-shrink: 0;
        }
        
        .btn {
            padding: 12px 18px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            min-height: 44px;
        }
        
        .btn-primary { background: var(--accent); color: #fff; width: 100%; }
        .btn-small {
            padding: 8px 14px;
            font-size: 12px;
            background: var(--btn);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            width: 100%;
            margin-top: 4px;
            min-height: 40px;
        }
        
        .divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
        
        .section-label {
            font-size: 11px;
            color: var(--sub);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }
        
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        
        .status-dot.saved { background: var(--success); }
        .status-dot.saving { background: #f1c40f; animation: pulse 1s infinite; }
        .status-dot.error { background: var(--danger); }
        
        @keyframes pulse {
            0%,100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .save-status {
            font-size: 10px;
            color: var(--sub);
            text-align: right;
            margin-top: 4px;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success);
            color: #000;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        .toast.show { opacity: 1; }
        .toast.error { background: var(--danger); color: #fff; }
        
        @media (max-width: 380px) {
            body { padding: 12px; }
            .avatar { width: 80px; height: 80px; }
            .link-btn { padding: 13px 16px; font-size: 14px; }
            .admin-panel { padding: 16px 14px; }
        }
    </style>
</head>
<body>

    <div class="container" id="publicView">
        <img class="avatar" id="pubAvatar" src="" alt="Avatar">
        <div class="name" id="pubName"></div>
        <div class="bio" id="pubBio"></div>
        <div class="links" id="pubLinks"></div>
        <div class="social-icons" id="pubSocials"></div>
        <button class="admin-entry" id="adminBtn">🔑 Админ</button>
    </div>

    <div class="admin-panel" id="adminPanel">
        <div class="admin-header">
            <button class="back-btn" id="backBtn">←</button>
            <h3>⚙️ Настройки</h3>
            <span class="save-status" id="saveStatus">
                <span class="status-dot saved"></span> Сохранено
            </span>
        </div>

        <div class="form-group">
            <label>📷 Аватар (ссылка)</label>
            <input type="url" id="editAvatar" placeholder="https://example.com/photo.jpg">
        </div>
        <div class="form-group">
            <label>👤 Имя</label>
            <input type="text" id="editName" placeholder="Твоё имя" maxlength="60">
        </div>
        <div class="form-group">
            <label>📝 Описание</label>
            <textarea id="editBio" placeholder="Пару слов о себе..." maxlength="200"></textarea>
        </div>

        <hr class="divider">
        <span class="section-label">🔗 Ссылки</span>
        <div id="editLinks"></div>
        <button class="btn-small" id="addLinkBtn">+ Добавить ссылку</button>

        <hr class="divider">
        <span class="section-label">🌐 Соцсети</span>
        <div id="editSocials"></div>
        <button class="btn-small" id="addSocialBtn">+ Добавить соцсеть</button>

        <button class="btn btn-primary" style="margin-top:20px;" id="saveBtn">💾 Сохранить в облако</button>
        <p style="font-size:10px;color:var(--sub);text-align:center;margin-top:8px;">
            Данные хранятся в Supabase и видны всем
        </p>
    </div>

    <div class="modal-overlay" id="passwordModal">
        <div class="modal">
            <h3>🔐 Вход</h3>
            <p>Введите пароль для редактирования</p>
            <input type="password" id="passwordInput" placeholder="Пароль" maxlength="30">
            <div class="error-msg" id="passwordError">❌ Неверный пароль</div>
            <div class="modal-buttons">
                <button class="btn-cancel" id="cancelBtn">Отмена</button>
                <button class="btn-submit" id="submitBtn">Войти</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // ===== НАСТРОЙКИ (замени на свои) =====
        const SUPABASE_URL = 'https://твой-проект.supabase.co';
        const SUPABASE_ANON_KEY = 'твой-anon-key';
        const ADMIN_PASSWORD = 'David';
        
        // ===== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ =====
        let db = null;
        let isAdmin = false;
        let data = {
            avatar: '',
            name: 'Твоё Имя',
            bio: 'Здесь может быть твоё описание.\nРасскажи о себе в пару строк.',
            links: [
                { title: 'Мой Telegram', url: 'https://t.me/username' },
                { title: 'YouTube канал', url: 'https://youtube.com/@username' },
                { title: 'GitHub', url: 'https://github.com/username' },
            ],
            socials: [
                { platform: 'telegram', url: 'https://t.me/username' },
                { platform: 'youtube', url: 'https://youtube.com/@username' },
                { platform: 'github', url: 'https://github.com/username' },
            ]
        };

        const platforms = [
            { value: 'telegram', label: 'Telegram', icon: 'fa-telegram' },
            { value: 'youtube', label: 'YouTube', icon: 'fa-youtube' },
            { value: 'github', label: 'GitHub', icon: 'fa-github' },
            { value: 'instagram', label: 'Insta', icon: 'fa-instagram' },
            { value: 'twitter', label: 'X/Twitter', icon: 'fa-x-twitter' },
            { value: 'twitch', label: 'Twitch', icon: 'fa-twitch' },
            { value: 'discord', label: 'Discord', icon: 'fa-discord' },
            { value: 'tiktok', label: 'TikTok', icon: 'fa-tiktok' },
            { value: 'linkedin', label: 'LinkedIn', icon: 'fa-linkedin' },
            { value: 'spotify', label: 'Spotify', icon: 'fa-spotify' },
            { value: 'vk', label: 'VK', icon: 'fa-vk' },
            { value: 'website', label: 'Сайт', icon: 'fa-globe' },
            { value: 'email', label: 'Email', icon: 'fa-envelope' },
        ];

        // ===== ИНИЦИАЛИЗАЦИЯ SUPABASE =====
        function initSupabase() {
            try {
                db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                return true;
            } catch (e) {
                console.error('Ошибка Supabase:', e);
                return false;
            }
        }

        // ===== ЗАГРУЗКА ДАННЫХ =====
        async function loadData() {
            if (!db) {
                loadFromLocalStorage();
                return;
            }
            
            try {
                const { data: profile, error } = await db
                    .from('profiles')
                    .select('*')
                    .eq('id', 1)
                    .single();
                
                if (error) throw error;
                
                if (profile) {
                    data.avatar = profile.avatar || '';
                    data.name = profile.name || '';
                    data.bio = profile.bio || '';
                    data.links = profile.links || [];
                    data.socials = profile.socials || [];
                }
            } catch (e) {
                console.log('Загрузка из Supabase не удалась:', e.message);
                loadFromLocalStorage();
            }
            
            renderPublic();
        }

        function loadFromLocalStorage() {
            const saved = localStorage.getItem('mylinktree_data');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    data = { ...data, ...parsed };
                } catch (e) {}
            }
        }

        // ===== СОХРАНЕНИЕ В SUPABASE =====
        async function saveToCloud() {
            if (!db) {
                showToast('❌ Supabase не подключён', true);
                return;
            }
            
            collectFormData();
            localStorage.setItem('mylinktree_data', JSON.stringify(data));
            setSaveStatus('saving');
            
            try {
                const { error } = await db
                    .from('profiles')
                    .upsert({
                        id: 1,
                        avatar: data.avatar,
                        name: data.name,
                        bio: data.bio,
                        links: data.links,
                        socials: data.socials,
                        updated_at: new Date().toISOString(),
                    }, { onConflict: 'id' });
                
                if (error) throw error;
                
                setSaveStatus('saved');
                renderPublic();
                showToast('✅ Сохранено в облако!');
            } catch (e) {
                console.error('Ошибка сохранения:', e);
                setSaveStatus('error');
                showToast('❌ Ошибка: ' + e.message, true);
            }
        }

        function collectFormData() {
            data.avatar = document.getElementById('editAvatar').value;
            data.name = document.getElementById('editName').value;
            data.bio = document.getElementById('editBio').value;

            const linkRows = document.querySelectorAll('#editLinks .link-row');
            data.links = [];
            linkRows.forEach(row => {
                const inputs = row.querySelectorAll('input');
                data.links.push({ title: inputs[0].value, url: inputs[1].value });
            });

            const socialRows = document.querySelectorAll('#editSocials .social-row');
            data.socials = [];
            socialRows.forEach(row => {
                const select = row.querySelector('select');
                const input = row.querySelector('input');
                data.socials.push({ platform: select.value, url: input.value });
            });
        }

        function setSaveStatus(status) {
            const statusEl = document.getElementById('saveStatus');
            const icons = { saved: '🟢', saving: '🟡', error: '🔴' };
            const texts = { saved: 'Сохранено', saving: 'Сохранение...', error: 'Ошибка' };
            statusEl.innerHTML = `<span class="status-dot ${status}"></span> ${texts[status]}`;
        }

        // ===== ОТРИСОВКА =====
        function renderPublic() {
            const avatarEl = document.getElementById('pubAvatar');
            if (data.avatar) {
                avatarEl.src = data.avatar;
            } else {
                avatarEl.src = 'data:image/svg+xml,' + encodeURIComponent(
                    '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect fill="%23333" width="100" height="100"/><text x="50" y="58" text-anchor="middle" fill="%23777" font-size="40">?</text></svg>'
                );
            }
            avatarEl.onerror = () => {
                avatarEl.src = 'data:image/svg+xml,' + encodeURIComponent(
                    '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect fill="%23333" width="100" height="100"/><text x="50" y="58" text-anchor="middle" fill="%23777" font-size="40">?</text></svg>'
                );
            };

            document.getElementById('pubName').textContent = data.name || 'Имя';
            document.getElementById('pubBio').textContent = data.bio || '';

            const linksDiv = document.getElementById('pubLinks');
            linksDiv.innerHTML = '';
            if (data.links && data.links.length > 0) {
                data.links.forEach(link => {
                    if (link.title || link.url) {
                        const a = document.createElement('a');
                        a.className = 'link-btn';
                        a.href = link.url || '#';
                        a.textContent = link.title || 'Ссылка';
                        a.target = '_blank';
                        a.rel = 'noopener noreferrer';
                        linksDiv.appendChild(a);
                    }
                });
            }

            const socialsDiv = document.getElementById('pubSocials');
            socialsDiv.innerHTML = '';
            if (data.socials && data.socials.length > 0) {
                data.socials.forEach(s => {
                    if (s.url) {
                        const plat = platforms.find(p => p.value === s.platform) || { icon: 'fa-link' };
                        const a = document.createElement('a');
                        a.className = 'social-icon';
                        a.href = s.url;
                        a.target = '_blank';
                        a.rel = 'noopener noreferrer';
                        a.innerHTML = `<i class="fa-brands ${plat.icon}"></i>`;
                        a.title = s.platform;
                        socialsDiv.appendChild(a);
                    }
                });
            }
        }

        function renderAdmin() {
            document.getElementById('editAvatar').value = data.avatar || '';
            document.getElementById('editName').value = data.name || '';
            document.getElementById('editBio').value = data.bio || '';

            const editLinksDiv = document.getElementById('editLinks');
            editLinksDiv.innerHTML = '';
            if (!data.links) data.links = [];
            data.links.forEach((link, i) => {
                const row = document.createElement('div');
                row.className = 'link-row';
                row.innerHTML = `
                    <input type="text" placeholder="Название" value="${esc(link.title || '')}" data-index="${i}" data-field="title" maxlength="80">
                    <input type="url" placeholder="https://..." value="${esc(link.url || '')}" data-index="${i}" data-field="url">
                    <button class="del-btn" data-action="deleteLink" data-index="${i}">×</button>
                `;
                editLinksDiv.appendChild(row);
            });

            const editSocialsDiv = document.getElementById('editSocials');
            editSocialsDiv.innerHTML = '';
            if (!data.socials) data.socials = [];
            data.socials.forEach((s, i) => {
                const row = document.createElement('div');
                row.className = 'social-row';
                let options = platforms.map(p =>
                    `<option value="${p.value}" ${s.platform === p.value ? 'selected' : ''}>${p.label}</option>`
                ).join('');
                row.innerHTML = `
                    <select data-index="${i}" data-field="platform">${options}</select>
                    <input type="url" placeholder="https://..." value="${esc(s.url || '')}" data-index="${i}" data-field="url">
                    <button class="del-btn" data-action="deleteSocial" data-index="${i}">×</button>
                `;
                editSocialsDiv.appendChild(row);
            });

            setSaveStatus('saved');
            
            // Делегирование событий для кнопок удаления
            document.querySelectorAll('[data-action="deleteLink"]').forEach(btn => {
                btn.onclick = function() {
                    const i = parseInt(this.dataset.index);
                    data.links.splice(i, 1);
                    renderAdmin();
                };
            });
            
            document.querySelectorAll('[data-action="deleteSocial"]').forEach(btn => {
                btn.onclick = function() {
                    const i = parseInt(this.dataset.index);
                    data.socials.splice(i, 1);
                    renderAdmin();
                };
            });
        }

        function esc(s) {
            return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // ===== УПРАВЛЕНИЕ АДМИНКОЙ =====
        function openPasswordModal() {
            document.getElementById('passwordModal').classList.add('active');
            document.getElementById('passwordInput').value = '';
            document.getElementById('passwordError').classList.remove('show');
            document.body.style.overflow = 'hidden';
            setTimeout(() => document.getElementById('passwordInput').focus(), 150);
        }

        function closePasswordModal() {
            document.getElementById('passwordModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function checkPassword() {
            if (document.getElementById('passwordInput').value === ADMIN_PASSWORD) {
                isAdmin = true;
                closePasswordModal();
                openAdmin();
            } else {
                const err = document.getElementById('passwordError');
                err.classList.add('show');
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').focus();
            }
        }

        function openAdmin() {
            document.getElementById('adminPanel').classList.add('active');
            document.getElementById('publicView').style.display = 'none';
            renderAdmin();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function closeAdmin() {
            document.getElementById('adminPanel').classList.remove('active');
            document.getElementById('publicView').style.display = '';
            renderPublic();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // ===== ПРИВЯЗКА СОБЫТИЙ =====
        document.addEventListener('DOMContentLoaded', () => {
            // Инициализация Supabase
            initSupabase();
            loadData();
            
            // Кнопка Админ
            document.getElementById('adminBtn').onclick = openPasswordModal;
            
            // Модалка
            document.getElementById('cancelBtn').onclick = closePasswordModal;
            document.getElementById('submitBtn').onclick = checkPassword;
            document.getElementById('passwordInput').onkeydown = (e) => {
                if (e.key === 'Enter') checkPassword();
            };
            document.getElementById('passwordModal').onclick = (e) => {
                if (e.target === document.getElementById('passwordModal')) closePasswordModal();
            };
            
            // Админка
            document.getElementById('backBtn').onclick = closeAdmin;
            document.getElementById('saveBtn').onclick = saveToCloud;
            document.getElementById('addLinkBtn').onclick = () => {
                data.links.push({ title: '', url: '' });
                renderAdmin();
            };
            document.getElementById('addSocialBtn').onclick = () => {
                data.socials.push({ platform: 'telegram', url: '' });
                renderAdmin();
            };
            
            // Автосохранение в localStorage
            ['editAvatar', 'editName', 'editBio'].forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.oninput = () => {
                        collectFormData();
                        localStorage.setItem('mylinktree_data', JSON.stringify(data));
                        setSaveStatus('saving');
                        clearTimeout(window._saveTimeout);
                        window._saveTimeout = setTimeout(() => setSaveStatus('saved'), 1500);
                    };
                }
            });
        });
    </script>
</body>
</html>
