  <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои ссылки</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --text: #ffffff;
            --sub: #aaaaaa;
            --btn: #2a2a2a;
            --btn-hover: #3a3a3a;
            --accent: #7289da;
            --border: #2a2a2a;
            --input: #111;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 480px;
            text-align: center;
        }
        /* Аватар и имя */
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 16px;
            object-fit: cover;
            display: block;
            border: 3px solid var(--border);
            background: var(--card);
        }
        .name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .bio {
            color: var(--sub);
            font-size: 14px;
            margin-bottom: 28px;
            white-space: pre-line;
        }
        /* Ссылки */
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .link-btn {
            display: block;
            width: 100%;
            padding: 14px 20px;
            background: var(--btn);
            color: var(--text);
            text-decoration: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.2s;
            border: 1px solid var(--border);
            text-align: center;
            word-break: break-word;
        }
        .link-btn:hover {
            background: var(--btn-hover);
            border-color: var(--accent);
            transform: translateY(-1px);
        }
        /* Кнопка входа в админку */
        .admin-entry {
            margin-top: 32px;
            font-size: 12px;
            color: var(--sub);
            cursor: pointer;
            background: none;
            border: none;
            opacity: 0.4;
            transition: opacity 0.2s;
        }
        .admin-entry:hover { opacity: 1; color: var(--accent); }
        /* Админ-панель */
        .admin-panel {
            display: none;
            margin-top: 24px;
            text-align: left;
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border);
        }
        .admin-panel.active { display: block; }
        .admin-panel h3 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 18px;
            color: var(--accent);
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--sub);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
        }
        .form-group textarea { min-height: 50px; }
        .link-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
        }
        .link-row input {
            flex: 1;
            padding: 8px 10px;
            background: var(--input);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 13px;
        }
        .link-row .del-btn {
            background: #3a1010;
            color: #ff6b6b;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            flex-shrink: 0;
            transition: background 0.2s;
        }
        .link-row .del-btn:hover { background: #5a1818; }
        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            width: 100%;
        }
        .btn-primary:hover { filter: brightness(1.15); }
        .btn-outline {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            margin-top: 8px;
            width: 100%;
        }
        .btn-outline:hover { background: var(--accent); color: #fff; }
        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            background: var(--btn);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 4px;
        }
        .btn-small:hover { background: var(--btn-hover); }
        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 16px 0;
        }
        /* Соцсети */
        .social-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
        }
        .social-row select {
            width: 80px;
            padding: 8px;
            background: var(--input);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 12px;
            flex-shrink: 0;
        }
        .social-row input {
            flex: 1;
            padding: 8px 10px;
            background: var(--input);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 13px;
        }
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 20px;
        }
        .social-icon {
            color: var(--sub);
            font-size: 22px;
            text-decoration: none;
            transition: color 0.2s;
        }
        .social-icon:hover { color: var(--accent); }
        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2ecc71;
            color: #000;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div class="container" id="publicView">
        <!-- Публичный вид -->
        <img class="avatar" id="pubAvatar" src="" alt="Avatar">
        <div class="name" id="pubName"></div>
        <div class="bio" id="pubBio"></div>
        <div class="links" id="pubLinks"></div>
        <div class="social-icons" id="pubSocials"></div>
        <button class="admin-entry" onclick="toggleAdmin()" title="Админка">🔑</button>
    </div>

    <!-- Админ-панель -->
    <div class="admin-panel" id="adminPanel">
        <h3>⚙️ Редактирование</h3>

        <div class="form-group">
            <label>Ссылка на аватар</label>
            <input type="text" id="editAvatar" placeholder="https://...">
        </div>
        <div class="form-group">
            <label>Имя</label>
            <input type="text" id="editName" placeholder="Твоё имя">
        </div>
        <div class="form-group">
            <label>Описание / Био</label>
            <textarea id="editBio" placeholder="Пару слов о себе"></textarea>
        </div>

        <hr class="divider">
        <label style="font-size:12px;color:var(--sub);text-transform:uppercase;letter-spacing:0.5px;">Ссылки</label>
        <div id="editLinks"></div>
        <button class="btn-small" onclick="addLink()">+ Добавить ссылку</button>

        <hr class="divider">
        <label style="font-size:12px;color:var(--sub);text-transform:uppercase;letter-spacing:0.5px;">Соцсети (иконки)</label>
        <div id="editSocials"></div>
        <button class="btn-small" onclick="addSocial()">+ Добавить соцсеть</button>

        <button class="btn-primary" style="margin-top:20px;" onclick="saveAll()">💾 Сохранить</button>
        <button class="btn-outline" onclick="exportJSON()">📤 Экспорт JSON</button>
        <button class="btn-outline" onclick="importJSON()">📥 Импорт JSON</button>
        <button class="btn-outline" style="border-color:#ff6b6b;color:#ff6b6b;" onclick="resetAll()">🗑 Сбросить всё</button>
        <p style="font-size:11px;color:var(--sub);text-align:center;margin-top:8px;">
            Данные хранятся в localStorage твоего браузера
        </p>
    </div>

    <div class="toast" id="toast">Сохранено!</div>

    <!-- Font Awesome для иконок соцсетей -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script>
        // ===== ДАННЫЕ ПО УМОЛЧАНИЮ =====
        const defaultData = {
            avatar: '',
            name: 'Твоё Имя',
            bio: 'Здесь может быть твоё описание.\nРасскажи о себе в паре строк.',
            links: [
                { title: 'Мой Telegram', url: 'https://t.me/username' },
                { title: 'YouTube канал', url: 'https://youtube.com/@username' },
                { title: 'GitHub', url: 'https://github.com/username' },
            ],
            socials: [
                { platform: 'telegram', url: 'https://t.me/username' },
                { platform: 'youtube', url: 'https://youtube.com/@username' },
                { platform: 'github', url: 'https://github.com/username' },
            ]
        };

        // Доступные платформы для соцсетей (Font Awesome классы)
        const platforms = [
            { value: 'telegram', label: 'Telegram', icon: 'fa-telegram' },
            { value: 'youtube', label: 'YouTube', icon: 'fa-youtube' },
            { value: 'github', label: 'GitHub', icon: 'fa-github' },
            { value: 'instagram', label: 'Instagram', icon: 'fa-instagram' },
            { value: 'twitter', label: 'Twitter/X', icon: 'fa-x-twitter' },
            { value: 'twitch', label: 'Twitch', icon: 'fa-twitch' },
            { value: 'discord', label: 'Discord', icon: 'fa-discord' },
            { value: 'tiktok', label: 'TikTok', icon: 'fa-tiktok' },
            { value: 'linkedin', label: 'LinkedIn', icon: 'fa-linkedin' },
            { value: 'spotify', label: 'Spotify', icon: 'fa-spotify' },
            { value: 'vk', label: 'VK', icon: 'fa-vk' },
            { value: 'website', label: 'Сайт', icon: 'fa-globe' },
            { value: 'email', label: 'Email', icon: 'fa-envelope' },
        ];

        let data = { ...defaultData };

        // ===== ЗАГРУЗКА ИЗ localStorage =====
        function loadData() {
            const saved = localStorage.getItem('mylinktree_data');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    data = { ...defaultData, ...parsed };
                    // Убедимся что массивы есть
                    if (!Array.isArray(data.links)) data.links = [...defaultData.links];
                    if (!Array.isArray(data.socials)) data.socials = [...defaultData.socials];
                } catch (e) {
                    data = { ...defaultData };
                }
            }
        }

        function saveData() {
            localStorage.setItem('mylinktree_data', JSON.stringify(data));
        }

        // ===== ОТРИСОВКА ПУБЛИЧНОЙ ЧАСТИ =====
        function renderPublic() {
            document.getElementById('pubAvatar').src = data.avatar || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect fill="%23333" width="100" height="100"/><text x="50" y="58" text-anchor="middle" fill="%23777" font-size="40" font-family="sans-serif">?</text></svg>';
            document.getElementById('pubName').textContent = data.name || 'Имя';
            document.getElementById('pubBio').textContent = data.bio || '';

            // Ссылки
            const linksDiv = document.getElementById('pubLinks');
            linksDiv.innerHTML = '';
            if (data.links && data.links.length > 0) {
                data.links.forEach(link => {
                    if (link.title || link.url) {
                        const a = document.createElement('a');
                        a.className = 'link-btn';
                        a.href = link.url || '#';
                        a.textContent = link.title || 'Ссылка';
                        a.target = '_blank';
                        a.rel = 'noopener noreferrer';
                        linksDiv.appendChild(a);
                    }
                });
            }

            // Соцсети
            const socialsDiv = document.getElementById('pubSocials');
            socialsDiv.innerHTML = '';
            if (data.socials && data.socials.length > 0) {
                data.socials.forEach(s => {
                    if (s.url) {
                        const plat = platforms.find(p => p.value === s.platform) || { icon: 'fa-link' };
                        const a = document.createElement('a');
                        a.className = 'social-icon';
                        a.href = s.url;
                        a.target = '_blank';
                        a.rel = 'noopener noreferrer';
                        a.innerHTML = `<i class="fa-brands ${plat.icon}"></i>`;
                        a.title = s.platform;
                        socialsDiv.appendChild(a);
                    }
                });
            }
        }

        // ===== ОТРИСОВКА АДМИНКИ =====
        function renderAdmin() {
            document.getElementById('editAvatar').value = data.avatar || '';
            document.getElementById('editName').value = data.name || '';
            document.getElementById('editBio').value = data.bio || '';

            // Ссылки
            const editLinksDiv = document.getElementById('editLinks');
            editLinksDiv.innerHTML = '';
            if (!data.links) data.links = [];
            data.links.forEach((link, i) => {
                const row = document.createElement('div');
                row.className = 'link-row';
                row.innerHTML = `
                    <input type="text" placeholder="Название" value="${escapeAttr(link.title || '')}" data-index="${i}" data-field="title">
                    <input type="text" placeholder="URL" value="${escapeAttr(link.url || '')}" data-index="${i}" data-field="url">
                    <button class="del-btn" onclick="deleteLink(${i})" title="Удалить">×</button>
                `;
                editLinksDiv.appendChild(row);
            });

            // Соцсети
            const editSocialsDiv = document.getElementById('editSocials');
            editSocialsDiv.innerHTML = '';
            if (!data.socials) data.socials = [];
            data.socials.forEach((s, i) => {
                const row = document.createElement('div');
                row.className = 'social-row';
                let options = platforms.map(p =>
                    `<option value="${p.value}" ${s.platform === p.value ? 'selected' : ''}>${p.label}</option>`
                ).join('');
                row.innerHTML = `
                    <select data-index="${i}" data-field="platform">${options}</select>
                    <input type="text" placeholder="URL" value="${escapeAttr(s.url || '')}" data-index="${i}" data-field="url">
                    <button class="del-btn" onclick="deleteSocial(${i})" title="Удалить">×</button>
                `;
                editSocialsDiv.appendChild(row);
            });

            // Слушатели для автосохранения при изменении полей
            document.querySelectorAll('#editLinks input, #editSocials input, #editSocials select').forEach(el => {
                el.addEventListener('input', autoSaveField);
            });
            ['editAvatar', 'editName', 'editBio'].forEach(id => {
                document.getElementById(id).addEventListener('input', autoSaveField);
            });
        }

        function escapeAttr(str) {
            return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function autoSaveField(e) {
            const el = e.target;
            const index = el.dataset.index;
            const field = el.dataset.field;

            if (index !== undefined && field) {
                // Это поле внутри массива links или socials
                const parent = el.closest('#editLinks') ? 'links' : 'socials';
                if (!data[parent][index]) return;
                data[parent][index][field] = el.value;
            } else if (el.id === 'editAvatar') {
                data.avatar = el.value;
            } else if (el.id === 'editName') {
                data.name = el.value;
            } else if (el.id === 'editBio') {
                data.bio = el.value;
            }
            saveData();
            renderPublic();
        }

        function addLink() {
            if (!data.links) data.links = [];
            data.links.push({ title: '', url: '' });
            saveData();
            renderPublic();
            renderAdmin();
        }

        function deleteLink(index) {
            data.links.splice(index, 1);
            saveData();
            renderPublic();
            renderAdmin();
        }

        function addSocial() {
            if (!data.socials) data.socials = [];
            data.socials.push({ platform: 'telegram', url: '' });
            saveData();
            renderPublic();
            renderAdmin();
        }

        function deleteSocial(index) {
            data.socials.splice(index, 1);
            saveData();
            renderPublic();
            renderAdmin();
        }

        function saveAll() {
            // Собираем всё из полей
            data.avatar = document.getElementById('editAvatar').value;
            data.name = document.getElementById('editName').value;
            data.bio = document.getElementById('editBio').value;

            // Ссылки
            const linkRows = document.querySelectorAll('#editLinks .link-row');
            data.links = [];
            linkRows.forEach(row => {
                const inputs = row.querySelectorAll('input');
                data.links.push({
                    title: inputs[0].value,
                    url: inputs[1].value
                });
            });

            // Соцсети
            const socialRows = document.querySelectorAll('#editSocials .social-row');
            data.socials = [];
            socialRows.forEach(row => {
                const select = row.querySelector('select');
                const input = row.querySelector('input');
                data.socials.push({
                    platform: select.value,
                    url: input.value
                });
            });

            saveData();
            renderPublic();
            showToast('✅ Сохранено!');
        }

        function toggleAdmin() {
            const panel = document.getElementById('adminPanel');
            panel.classList.toggle('active');
            if (panel.classList.contains('active')) {
                renderAdmin();
                panel.scrollIntoView({ behavior: 'smooth' });
            }
        }

        function exportJSON() {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'mylinktree_backup.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('📤 Экспортировано!');
        }

        function importJSON() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const imported = JSON.parse(ev.target.result);
                        data = { ...defaultData, ...imported };
                        if (!Array.isArray(data.links)) data.links = [];
                        if (!Array.isArray(data.socials)) data.socials = [];
                        saveData();
                        renderPublic();
                        renderAdmin();
                        showToast('📥 Импортировано!');
                    } catch (err) {
                        showToast('❌ Ошибка в JSON-файле');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function resetAll() {
            if (confirm('Точно сбросить все данные к значениям по умолчанию?')) {
                data = { ...defaultData };
                saveData();
                renderPublic();
                renderAdmin();
                showToast('🗑 Сброшено!');
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        loadData();
        renderPublic();
    </script>
</body>
</html>
